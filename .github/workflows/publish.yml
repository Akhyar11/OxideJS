name: Publish to NPM

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version change
        id: version_check
        run: |
          LOCAL_VERSION=$(node -e "import fs from 'fs'; console.log(JSON.parse(fs.readFileSync('./package.json')).version)")
          PACKAGE_NAME=$(node -e "import fs from 'fs'; console.log(JSON.parse(fs.readFileSync('./package.json')).name)")
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ Version unchanged ($LOCAL_VERSION). Skipping publish."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🚀 Version changed: $NPM_VERSION → $LOCAL_VERSION"
          fi

      - name: Setup Node.js
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.version_check.outputs.changed == 'true'
        run: npm ci

      - name: Build TypeScript
        if: steps.version_check.outputs.changed == 'true'
        run: npm run build:publish

      - name: Publish to NPM
        if: steps.version_check.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
