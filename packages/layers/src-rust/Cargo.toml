[package]
name = "layers-native"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.12.2", features = ["async", "napi4"] }
napi-derive = "2.12.2"
rayon = "1.10"

[build-dependencies]
napi-build = "2.0.1"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
